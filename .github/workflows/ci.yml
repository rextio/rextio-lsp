name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 0.1.3

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run full test suite
        run: python -m pytest -q

  quality:
    name: Ruff and mypy (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run Ruff
        run: python -m ruff check src tests
      - name: Run mypy
        run: python -m mypy

  live-core-contract:
    name: Live Core 0.1.5 contract integration (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install the pinned Core producer and LSP test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "rextio==0.1.5"
          python -m pip install -e ".[dev]"
      - name: Assert the released producer contract
        run: |
          python -c "from rextio.contract import TOOLING_CONTRACT_VERSION; assert TOOLING_CONTRACT_VERSION == '2.24.0'"
      - name: Exercise the live Core integration surface
        run: python -m pytest -q tests/test_integration.py

  package:
    name: Build and install artifacts (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine check-wheel-contents
      - name: Build wheel and sdist
        run: python -m build
      - name: Check artifact metadata and wheel contents
        run: |
          python -m twine check dist/*
          check-wheel-contents dist/*.whl
      - name: Install and smoke-test wheel
        run: |
          python -m venv /tmp/rextio-lsp-wheel
          /tmp/rextio-lsp-wheel/bin/python -m pip install --upgrade pip
          /tmp/rextio-lsp-wheel/bin/python -m pip install dist/*.whl
          /tmp/rextio-lsp-wheel/bin/python -c "import importlib.metadata as m; assert m.version('rextio-lsp') == '0.1.3'"
          timeout 10s /tmp/rextio-lsp-wheel/bin/rextio-lsp < /dev/null
      - name: Install and smoke-test sdist
        run: |
          python -m venv /tmp/rextio-lsp-sdist
          /tmp/rextio-lsp-sdist/bin/python -m pip install --upgrade pip
          /tmp/rextio-lsp-sdist/bin/python -m pip install dist/*.tar.gz
          /tmp/rextio-lsp-sdist/bin/python -c "import importlib.metadata as m; assert m.version('rextio-lsp') == '0.1.3'"
          timeout 10s /tmp/rextio-lsp-sdist/bin/rextio-lsp < /dev/null
